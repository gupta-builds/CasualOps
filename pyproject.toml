[tool.black]
line-length = 88
target-version = ["py312"]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = []

[tool.pyright]
extraPaths = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "-q -p no:pytest_ethereum -p no:asyncio"
markers = [
    "kafka: integration tests that require a reachable KAFKA_BOOTSTRAP broker",
]
filterwarnings = [
    "ignore:The copy keyword is deprecated and will be removed in a future version.*",
    "ignore:Using `httpx` with `starlette.testclient` is deprecated.*",
]
