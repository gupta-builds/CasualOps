services:
  api:
    build: .
    command: sh -c "cd src && uvicorn api:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HIVEMIND_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./app
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:8080"
